name: Testes Automatizados — Cypress + API

# Quando disparar este pipeline:
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ===========================================================================
  # Job 1: Testes Cypress sem BDD (Page Object Model)
  # ===========================================================================
  testes-sem-bdd:
    name: Cypress — Testes sem BDD (POM)
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cypress-project/package-lock.json

      - name: Instalar dependências do Cypress
        working-directory: cypress-project
        run: npm ci

      - name: Executar testes sem BDD
        working-directory: cypress-project
        run: npm run test:sem-bdd
        env:
          CYPRESS_defaultCommandTimeout: 10000

      - name: Fazer upload das capturas de tela em caso de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-sem-bdd
          path: cypress-project/cypress/screenshots/
          retention-days: 7

  # ===========================================================================
  # Job 2: Testes Cypress BDD (Gherkin/Cucumber)
  # ===========================================================================
  testes-bdd:
    name: Cypress — Testes BDD (Gherkin)
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cypress-project/package-lock.json

      - name: Instalar dependências do Cypress
        working-directory: cypress-project
        run: npm ci

      - name: Executar testes BDD
        working-directory: cypress-project
        run: npm run test:bdd
        env:
          CYPRESS_defaultCommandTimeout: 10000

      - name: Fazer upload das capturas de tela em caso de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-bdd
          path: cypress-project/cypress/screenshots/
          retention-days: 7

  # ===========================================================================
  # Job 3: Testes de API com Newman (Postman)
  # ===========================================================================
  testes-api:
    name: API — Testes Newman (PokéAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-testing/package-lock.json

      - name: Instalar dependências do Newman
        working-directory: api-testing
        run: npm ci

      - name: Executar testes de API
        working-directory: api-testing
        run: npm test
